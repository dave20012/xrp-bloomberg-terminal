name: CI

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements_worker.txt
      - name: Lint (syntax)
        run: python -m compileall .
      - name: Unit tests
        env:
          SKIP_LIVE_FETCH: "1"
        run: python -m unittest discover -s tests
